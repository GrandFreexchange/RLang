<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slovo | Russian Learning Environment</title>

    <!-- Fonts: Inter for UI, Playfair Display for Russian text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        brand: {
                            red: '#E63946',
                            dark: '#1D3557',
                            light: '#F8F9FA',
                            card: '#FFFFFF',
                            green: '#2A9D8F',
                            orange: '#F4A261',
                            blue: '#457B9D'
                        }
                    },
                    boxShadow: {
                        'crisp': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0,0,0,0.05)',
                        'crisp-hover': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0,0,0,0.05)'
                    },
                    animation: {
                        'bounce-slight': 'bounce-slight 0.3s ease-in-out',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards'
                    },
                    keyframes: {
                        'bounce-slight': {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(0.98)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8F9FA;
            color: #1D3557;
            -webkit-font-smoothing: antialiased;
        }

        /* Robust 3D Flip Card Utilities */
        .perspective-1000 {
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            /* Safari support */
            backface-visibility: hidden;
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        /* Interactive button press effect */
        .btn-press:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col font-sans selection:bg-brand-red selection:text-white" id="appBody">

                    style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231D3557%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right .7rem top 50%; background-size: .65rem auto;">
                    <!-- Populated via JS -->
                </select>

    </header>

    <!-- Main Workspace -->
    <main class="flex-1 max-w-6xl w-full mx-auto p-4 flex flex-col md:flex-row gap-8 mt-6">

        <!-- Left Column: Navigation & Analytics -->
        <aside class="md:w-72 flex-shrink-0 flex flex-col gap-6">
            <!-- Modes -->
            <div class="bg-white p-2 rounded-2xl shadow-crisp flex flex-col gap-1 border border-gray-100">
                <button id="btnStudyMode" onclick="setMode('study')"
                    class="flex items-center justify-between px-4 py-3.5 rounded-xl bg-brand-dark text-white font-medium transition-all shadow-md">
                    <div class="flex items-center gap-3"><i data-lucide="brain" class="w-5 h-5"></i> Learn & Review
                    </div>
                    <span id="dueBadge"
                        class="bg-brand-red text-white text-xs px-2 py-0.5 rounded-full font-bold hidden">0</span>
                </button>
                <button id="btnEditMode" onclick="setMode('edit')"
                    class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-brand-dark font-medium transition-all">
                    <i data-lucide="database" class="w-5 h-5"></i> Manage Deck
                </button>
            </div>

            <!-- Deck Analytics -->
            <div class="bg-white p-6 rounded-2xl shadow-crisp border border-gray-100">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-5 flex items-center gap-2">
                    <i data-lucide="activity" class="w-4 h-4"></i> Deck Mastery
                </h3>

                <div id="masteryStats" class="space-y-4">
                    <!-- Populated via JS -->
                </div>

                <div class="mt-6 pt-5 border-t border-gray-100">
                    <button onclick="resetDeckProgress()"
                        class="text-xs text-gray-400 hover:text-brand-dark flex items-center gap-2 font-medium transition-colors w-full justify-center btn-press">
                        <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Reset Progress
                    </button>
                </div>
            </div>
        </aside>

        <!-- Right Column: Interactive Area -->
        <section id="mainContent" class="flex-1 min-h-[500px] flex flex-col">
            <!-- Rendered via JS -->
        </section>

    </main>

    <!-- JavaScript Logic -->

                    { ru: 'во', en: 'in', level: 0 },
                    { ru: 'ничто', en: 'nothing', level: 0 },
                    { ru: 'потом', en: 'then', level: 0 },
                    { ru: 'очень', en: 'very', level: 0 },
                    { ru: 'со', en: 'with', level: 0 },
                    { ru: 'хотеть', en: 'to want', level: 0 },
                    { ru: 'ли', en: 'whether', level: 0 },
                    { ru: 'при', en: 'at, by', level: 0 },
                    { ru: 'голова', en: 'head', level: 0 },
                    { ru: 'надо', en: 'need', level: 0 },
                    { ru: 'без', en: 'without', level: 0 },
                    { ru: 'видеть', en: 'to see', level: 0 },
                    { ru: 'идти', en: 'to go', level: 0 },
                    { ru: 'теперь', en: 'now', level: 0 },
                    { ru: 'тоже', en: 'also', level: 0 },
                    { ru: 'стоять', en: 'to stand', level: 0 },
                    { ru: 'друг', en: 'friend', level: 0 },
                    { ru: 'дом', en: 'house', level: 0 }
                ]
            }
        ];

        // --- Application State ---
        let decks = [];
        let activeDeckId = null;
        let currentMode = 'study';

        // Active Session State
        let studyQueue = [];
        let currentCard = null;
        let isCardFlipped = false;
        let sessionStats = { cardsReviewed: 0 };

        // --- Initialization ---
        function init() {
            lucide.createIcons();
            loadFromStorage();

            if (decks.length === 0) {
                decks = JSON.parse(JSON.stringify(defaultDecks));
                saveToStorage();
            }

            if (!activeDeckId || !decks.find(d => d.id === activeDeckId)) {
                activeDeckId = decks[0].id;
            }

            window.addEventListener('keydown', handleKeyPress);

            document.getElementById('deckSelector').addEventListener('change', (e) => {
                activeDeckId = e.target.value;
                saveToStorage();
                startStudySession();
            });

            startStudySession();
            renderHeader();
        }

        // --- Core Logic: Spaced Repetition (Lite) ---
        function gradeCard(quality) {
            // Quality: 1 (Again/Hard), 2 (Good), 3 (Easy)
            if (!isCardFlipped || !currentCard) return;

            const originalLevel = currentCard.level || 0;

            if (quality === 1) {
                // Failed/Hard -> Reset to learning
                currentCard.level = 0;
            } else if (quality === 2) {
                // Good -> Progress by 1 level
                currentCard.level = Math.min(3, originalLevel + 1);
            } else if (quality === 3) {
                // Easy -> Jump to mastered or advance by 2
                currentCard.level = Math.min(3, originalLevel + 2);
            }

            sessionStats.cardsReviewed++;

            // If card is still not mastered (level < 3) and was graded 'Again', put it back at end of queue
            if (quality === 1 && currentCard.level < 3) {
                studyQueue.push(currentCard);
            }

            saveToStorage();
            nextCard();
        }

        function nextCard() {
            currentCard = studyQueue.length > 0 ? studyQueue.shift() : null;
            isCardFlipped = false;
            renderAnalytics();
            renderMainContent();
        }

        function startStudySession() {
            const deck = getActiveDeck();
            if (!deck) return;

            // Algorithm: Prioritize level 0 (New/Failed), then 1, then 2. 
            // Simulated Spaced Repetition logic for immediate session learning
            let cardsToStudy = [...deck.cards].filter(c => (c.level || 0) < 3);

            // If all cards are mastered, just review a random selection to keep them fresh
            if (cardsToStudy.length === 0 && deck.cards.length > 0) {
                cardsToStudy = [...deck.cards].sort(() => Math.random() - 0.5).slice(0, 10);
                cardsToStudy.forEach(c => c.level = 2); // Temp drop level to force review
            } else {
                // Sort by level (lowest first), then randomize within levels
                cardsToStudy.sort((a, b) => {
                    const levelDiff = (a.level || 0) - (b.level || 0);
                    if (levelDiff === 0) return Math.random() - 0.5;
                    return levelDiff;
                });
            }

            studyQueue = cardsToStudy;
            sessionStats = { cardsReviewed: 0 };
            nextCard();
        }

        // --- Interactive Controls ---
        function handleKeyPress(e) {
            if (currentMode !== 'study' || !currentCard || document.activeElement.tagName === 'INPUT') return;

            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            } else if (e.code === 'KeyA' && !isCardFlipped) {
                e.preventDefault();
                speakRussian(currentCard.ru);
            } else if (isCardFlipped) {
                if (e.code === 'Digit1' || e.code === 'Numpad1') { e.preventDefault(); gradeCard(1); } // Again
                else if (e.code === 'Digit2' || e.code === 'Numpad2') { e.preventDefault(); gradeCard(2); } // Good
                else if (e.code === 'Digit3' || e.code === 'Numpad3') { e.preventDefault(); gradeCard(3); } // Easy
            }
        }

        function flipCard() {
            if (!currentCard || isCardFlipped) return;

            isCardFlipped = true;

            const cardEl = document.getElementById('studyCard');
            if (cardEl) {
                cardEl.classList.remove('animate-bounce-slight');
                void cardEl.offsetWidth;
                cardEl.classList.add('animate-bounce-slight', 'flipped');
            }

            const controlsEl = document.getElementById('gradingControls');
            if (controlsEl) {
                controlsEl.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                controlsEl.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
            }
        }

        function speakRussian(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);

                const btn = document.getElementById('audioBtn');
                if (btn) {
                    btn.classList.add('bg-brand-red', 'text-white', 'border-brand-red');
                    setTimeout(() => btn.classList.remove('bg-brand-red', 'text-white', 'border-brand-red'), 500);
                }
            } else {
                alert("Text-to-speech not supported in this browser.");
            }
        }

        // --- Storage & Data Management ---
        function loadFromStorage() {
            const stored = localStorage.getItem('slovo_decks_v3');
            if (stored) decks = JSON.parse(stored);
            activeDeckId = localStorage.getItem('slovo_active_deck_v3');
        }

        function saveToStorage() {
            localStorage.setItem('slovo_decks_v3', JSON.stringify(decks));
            if (activeDeckId) localStorage.setItem('slovo_active_deck_v3', activeDeckId);
        }

        function getActiveDeck() {
            return decks.find(d => d.id === activeDeckId) || decks[0];
        }

        function setMode(mode) {
            currentMode = mode;
            const btnStudy = document.getElementById('btnStudyMode');
            const btnEdit = document.getElementById('btnEditMode');

            if (mode === 'study') {
                btnStudy.className = "flex items-center justify-between px-4 py-3.5 rounded-xl bg-brand-dark text-white font-medium transition-all shadow-md";
                btnEdit.className = "flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-brand-dark font-medium transition-all";
                startStudySession();
            } else {
                btnEdit.className = "flex items-center gap-3 px-4 py-3.5 rounded-xl bg-brand-dark text-white font-medium transition-all shadow-md";
                btnStudy.className = "flex items-center justify-between px-4 py-3.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-brand-dark font-medium transition-all";
                renderMainContent();
            }
        }

        function createNewDeck() {
            const name = prompt("Enter a name for the new learning deck:");
            if (name && name.trim() !== "") {
                const newDeck = { id: 'deck_' + Date.now(), name: name.trim(), cards: [] };
                decks.push(newDeck);
                activeDeckId = newDeck.id;
                saveToStorage();
                setMode('edit');
                renderHeader();
            }
        }

        function addCard() {
            const ruInput = document.getElementById('newCardRu');
            const enInput = document.getElementById('newCardEn');

            if (ruInput.value.trim() === '' || enInput.value.trim() === '') {
                alert("Please provide both Russian phrase and English meaning.");
                return;
            }

            const deck = getActiveDeck();
            deck.cards.push({
                ru: ruInput.value.trim(),
                en: enInput.value.trim(),
                level: 0
            });
            saveToStorage();

            ruInput.value = '';
            enInput.value = '';
            ruInput.focus();

            renderAnalytics();
            renderMainContent();
        }

        function deleteCard(index) {
            if (confirm("Remove this phrase from the deck?")) {
                getActiveDeck().cards.splice(index, 1);
                saveToStorage();
                renderAnalytics();
                renderMainContent();
            }
        }

        function resetDeckProgress() {
            if (confirm("Are you sure you want to reset all learning progress for this deck? Cards will return to 'New' status.")) {
                const deck = getActiveDeck();
                deck.cards.forEach(c => c.level = 0);
                saveToStorage();
                startStudySession();
            }
        }

        // --- UI Rendering ---
        function getLevelColor(level) {
            switch (level) {
                case 3: return 'bg-brand-green'; // Mastered
                case 2: return 'bg-brand-blue';  // Reviewing
                case 1: return 'bg-brand-orange';// Learning
                default: return 'bg-gray-300';   // New
            }
        }

        function renderHeader() {
            const selector = document.getElementById('deckSelector');
            selector.innerHTML = '';
            decks.forEach(deck => {
                const option = document.createElement('option');
                option.value = deck.id;
                option.textContent = deck.name;
                if (deck.id === activeDeckId) option.selected = true;
                selector.appendChild(option);
            });
            renderAnalytics();
        }

        function renderAnalytics() {
            const deck = getActiveDeck();
            const container = document.getElementById('masteryStats');

            if (!deck || deck.cards.length === 0) {
                container.innerHTML = `<p class="text-sm text-gray-400 italic">Add cards to see stats.</p>`;
                document.getElementById('dueBadge').classList.add('hidden');
                return;
            }

            const stats = { 0: 0, 1: 0, 2: 0, 3: 0 };
            deck.cards.forEach(c => stats[c.level || 0]++);
            const total = deck.cards.length;

            const dueCount = stats[0] + stats[1] + stats[2];
            const badge = document.getElementById('dueBadge');
            if (dueCount > 0) {
                badge.textContent = dueCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            container.innerHTML = `
                <!-- Progress Bar -->
                <div class="w-full h-3 flex rounded-full overflow-hidden bg-gray-100 mb-6 border border-gray-200">
                    <div style="width: ${(stats[3] / total) * 100}%" class="bg-brand-green h-full transition-all duration-500" title="Mastered"></div>
                    <div style="width: ${(stats[2] / total) * 100}%" class="bg-brand-blue h-full transition-all duration-500" title="Reviewing"></div>
                    <div style="width: ${(stats[1] / total) * 100}%" class="bg-brand-orange h-full transition-all duration-500" title="Learning"></div>
                </div>
                
                <!-- Legend -->
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-brand-green"></div>
                            <span class="text-sm text-gray-600 font-medium">Mastered</span>
                        </div>
                        <span class="text-sm font-bold text-brand-dark">${stats[3]}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-brand-blue"></div>
                            <span class="text-sm text-gray-600 font-medium">Reviewing</span>
                        </div>
                        <span class="text-sm font-bold text-brand-dark">${stats[2]}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-brand-orange"></div>
                            <span class="text-sm text-gray-600 font-medium">Learning</span>
                        </div>
                        <span class="text-sm font-bold text-brand-dark">${stats[1]}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-gray-300"></div>
                            <span class="text-sm text-gray-600 font-medium">New</span>
                        </div>
                        <span class="text-sm font-bold text-brand-dark">${stats[0]}</span>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderMainContent() {
            const container = document.getElementById('mainContent');
            const deck = getActiveDeck();

            if (currentMode === 'study') {
                if (deck.cards.length === 0) {
                    container.innerHTML = `
                        <div class="flex-1 bg-white rounded-3xl shadow-crisp border border-gray-100 flex flex-col items-center justify-center p-10 text-center animate-fade-in">
                            <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-6 text-gray-400">
                                <i data-lucide="book-plus" class="w-10 h-10"></i>
                            </div>
                            <h2 class="text-2xl font-serif font-bold text-brand-dark mb-2">This deck is empty</h2>
                            <p class="text-gray-500 mb-8 max-w-md">Add some Russian phrases to begin your learning session.</p>
                            <button onclick="setMode('edit')" class="bg-brand-dark text-white px-8 py-3.5 rounded-xl font-bold hover:bg-opacity-90 transition-all shadow-md btn-press">
                                Go to Deck Manager
                            </button>
                        </div>
                    `;
                } else if (!currentCard) {
                    container.innerHTML = `
                        <div class="flex-1 bg-white rounded-3xl shadow-crisp border border-gray-100 flex flex-col items-center justify-center p-10 text-center animate-slide-up">
                            <div class="w-24 h-24 bg-green-50 text-brand-green rounded-full flex items-center justify-center mb-6">
                                <i data-lucide="party-popper" class="w-12 h-12"></i>
                            </div>
                            <h2 class="text-4xl font-serif font-bold text-brand-dark mb-2">Session Complete!</h2>
                            <p class="text-gray-500 mb-8 text-lg">You've reviewed <span class="font-bold text-brand-dark">${sessionStats.cardsReviewed}</span> cards today.</p>
                            
                            <button onclick="startStudySession()" class="bg-brand-dark text-white px-8 py-3.5 rounded-xl font-bold hover:bg-opacity-90 transition-all shadow-md btn-press flex items-center gap-2">
                                <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Review More
                            </button>
                        </div>
                    `;
                } else {
                    // Active Learning Card
                    const isNew = (currentCard.level || 0) === 0;
                    const levelLabel = isNew ? 'New Card' : ['Learning', 'Reviewing', 'Mastered'][currentCard.level - 1];
                    const levelColor = isNew ? 'text-gray-500 bg-gray-100' :
                        (currentCard.level === 1 ? 'text-brand-orange bg-orange-50' :
                            (currentCard.level === 2 ? 'text-brand-blue bg-blue-50' : 'text-brand-green bg-green-50'));

                    container.innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center animate-fade-in w-full max-w-2xl mx-auto">
                            
                            <!-- Queue indicator -->
                            <div class="w-full flex justify-between items-end mb-4 px-2">
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">${studyQueue.length} cards remaining</span>
                                <span class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full ${levelColor}">${levelLabel}</span>
                            </div>

                            <!-- Flashcard 3D Container -->
                            <div class="w-full aspect-[4/3] sm:aspect-[16/10] perspective-1000 cursor-pointer group mb-6" onclick="flipCard()">
                                <div id="studyCard" class="flip-card w-full h-full ${isCardFlipped ? 'flipped' : ''}">
                                    <div class="flip-card-inner">
                                        <!-- Front (Russian Challenge) -->
                                        <div class="flip-card-front bg-white rounded-[2rem] shadow-crisp border border-gray-100 flex flex-col items-center justify-center p-8 text-center relative overflow-hidden group-hover:shadow-lg transition-shadow">
                                            <button id="audioBtn" onclick="event.stopPropagation(); speakRussian('${currentCard.ru.replace(/'/g, "\\'")}')" class="absolute top-6 right-6 w-12 h-12 rounded-full border border-gray-200 text-gray-400 hover:text-brand-dark hover:border-brand-dark flex items-center justify-center transition-colors btn-press z-10 bg-white shadow-sm" title="Listen (Press A)">
                                                <i data-lucide="volume-2" class="w-5 h-5"></i>
                                            </button>
                                            
                                            <h2 class="text-4xl sm:text-5xl lg:text-6xl font-serif font-medium text-brand-dark leading-tight px-4 mt-4">${currentCard.ru}</h2>
                                            
                                            <div class="absolute bottom-8 flex flex-col items-center text-brand-blue/70">
                                                <i data-lucide="mouse-pointer-click" class="w-5 h-5 mb-1.5 animate-bounce"></i>
                                                <span class="text-xs font-bold uppercase tracking-widest bg-blue-50 px-3 py-1 rounded-full">Reveal Answer</span>
                                            </div>
                                        </div>

                                        <!-- Back (English Meaning) -->
                                        <div class="flip-card-back bg-[#1E293B] rounded-[2rem] shadow-crisp flex flex-col items-center justify-center p-8 text-center border border-gray-800">
                                            <span class="text-xs font-bold tracking-widest text-brand-light uppercase mb-6 opacity-60 bg-white/10 px-3 py-1 rounded-full border border-white/5">Translation</span>
                                            <h2 class="text-4xl sm:text-5xl font-sans font-medium text-white leading-tight px-4">${currentCard.en}</h2>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- SRS Grading Controls Container (Fixed height to prevent layout shift) -->
                            <div class="w-full h-24 relative mt-2">
                                <div id="gradingControls" class="absolute inset-0 w-full flex gap-3 sm:gap-4 transition-all duration-300 ${isCardFlipped ? 'opacity-100 translate-y-0 pointer-events-auto' : 'opacity-0 translate-y-4 pointer-events-none'}">
                                    <button onclick="gradeCard(1)" class="flex-1 bg-white border border-gray-200 hover:border-brand-red text-brand-dark hover:text-brand-red p-4 rounded-2xl font-bold flex flex-col items-center justify-center transition-all btn-press shadow-sm group hover:shadow-md">
                                        <span class="text-lg mb-1 block group-hover:scale-110 transition-transform">🤔</span>
                                        Again
                                        <span class="text-[10px] uppercase tracking-wider text-gray-400 mt-1.5 block">Press 1</span>
                                    </button>
                                    <button onclick="gradeCard(2)" class="flex-1 bg-white border border-gray-200 hover:border-brand-blue text-brand-dark hover:text-brand-blue p-4 rounded-2xl font-bold flex flex-col items-center justify-center transition-all btn-press shadow-sm group hover:shadow-md">
                                        <span class="text-lg mb-1 block group-hover:scale-110 transition-transform">👍</span>
                                        Good
                                        <span class="text-[10px] uppercase tracking-wider text-gray-400 mt-1.5 block">Press 2</span>
                                    </button>
                                    <button onclick="gradeCard(3)" class="flex-1 bg-white border border-gray-200 hover:border-brand-green text-brand-dark hover:text-brand-green p-4 rounded-2xl font-bold flex flex-col items-center justify-center transition-all btn-press shadow-sm group hover:shadow-md">
                                        <span class="text-lg mb-1 block group-hover:scale-110 transition-transform">🎉</span>
                                        Easy
                                        <span class="text-[10px] uppercase tracking-wider text-gray-400 mt-1.5 block">Press 3</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            else if (currentMode === 'edit') {
                // ---------- EDIT MODE (DECK MANAGEMENT) ----------
                let cardsHTML = deck.cards.map((card, idx) => {
                    const level = card.level || 0;
                    const levelColor = getLevelColor(level);
                    return `
                    <div class="bg-white border border-gray-100 p-4 sm:p-5 rounded-2xl shadow-sm flex flex-col sm:flex-row gap-4 items-start sm:items-center group hover:border-brand-blue transition-colors relative overflow-hidden">
                        <!-- Mastery Indicator line -->
                        <div class="absolute left-0 top-0 bottom-0 w-1.5 ${levelColor}"></div>
                        
                        <div class="flex-1 w-full pl-3">
                            <div class="font-serif text-lg sm:text-xl text-brand-dark mb-1">${card.ru}</div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Russian</label>
                        </div>
                        
                        <div class="hidden sm:block w-px h-10 bg-gray-100"></div>
                        
                        <div class="flex-1 w-full pl-3 sm:pl-0">
                            <div class="font-sans text-base sm:text-lg text-gray-700 mb-1">${card.en}</div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">English</label>
                        </div>
                        
                        <div class="flex items-center self-end sm:self-center mt-2 sm:mt-0 gap-2 pr-1">
                            <div class="flex items-center gap-1.5 px-3 py-1 bg-gray-50 rounded-lg border border-gray-100 mr-2" title="Mastery Level">
                                <div class="w-2 h-2 rounded-full ${levelColor}"></div>
                                <span class="text-xs font-bold text-gray-500">Lvl ${level}</span>
                            </div>
                            <button onclick="deleteCard(${idx})" class="text-gray-400 hover:text-brand-red hover:bg-red-50 transition-all p-2.5 rounded-xl btn-press" title="Delete Phrase">
                                <i data-lucide="trash-2" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                            </button>
                        </div>
                    </div>
                `}).join('');

                container.innerHTML = `
                    <div class="bg-white rounded-3xl shadow-crisp p-5 md:p-8 border border-gray-100 animate-fade-in flex-1 flex flex-col">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                            <h2 class="text-2xl font-bold text-brand-dark flex items-center gap-3">
                                <div class="p-2 bg-blue-50 rounded-lg"><i data-lucide="database" class="w-6 h-6 text-brand-blue"></i></div> 
                                ${deck.name}
                            </h2>
                        </div>
                        
                        <!-- Add Phrase Form -->
                        <div class="bg-gray-50 p-5 sm:p-6 rounded-2xl border border-gray-200 mb-8 flex flex-col sm:flex-row gap-4 items-end shadow-inner">
                            <div class="flex-1 w-full">
                                <label class="text-xs text-gray-500 font-bold uppercase tracking-wide mb-2 block">Russian Phrase</label>
                                <input type="text" id="newCardRu" placeholder="e.g. Как дела?" class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white focus:outline-none focus:ring-2 focus:ring-brand-blue focus:border-transparent font-serif text-lg transition-all shadow-sm">
                            </div>
                            <div class="flex-1 w-full">
                                <label class="text-xs text-gray-500 font-bold uppercase tracking-wide mb-2 block">English Meaning</label>
                                <input type="text" id="newCardEn" placeholder="e.g. How are you?" class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-white focus:outline-none focus:ring-2 focus:ring-brand-blue focus:border-transparent font-sans text-base transition-all shadow-sm" onkeypress="if(event.key === 'Enter') addCard()">
                            </div>
                            <button onclick="addCard()" class="bg-brand-dark text-white px-6 py-3 rounded-xl font-bold hover:bg-opacity-90 transition-colors shadow-md w-full sm:w-auto flex justify-center items-center gap-2 btn-press">
                                <i data-lucide="plus" class="w-5 h-5"></i> Add
                            </button>
                        </div>

                        <!-- Vocabulary List -->
                        <div class="flex items-center justify-between mb-4 border-b border-gray-100 pb-3">
                            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Vocabulary List</h3>
                            <span class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-md text-xs font-bold">${deck.cards.length} items</span>
                        </div>
                        
                        <div class="space-y-3 overflow-y-auto pr-2 pb-4 flex-1">
                            ${cardsHTML || `
                                <div class="py-16 flex flex-col items-center justify-center text-center bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                                    <i data-lucide="layers" class="w-12 h-12 text-gray-300 mb-3"></i>
                                    <p class="text-gray-500 font-medium">No vocabulary words yet.</p>
                                    <p class="text-sm text-gray-400 mt-1">Add your first phrase using the form above to start learning.</p>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>

</html>
